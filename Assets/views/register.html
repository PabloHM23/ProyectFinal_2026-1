<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../Styles/register.css">
    <link rel="shortcut icon" href="../Img/logo.png" type="image/x-icon">
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <img src="../Img/logo.png" alt="Login Image" class="login-image">
            <h1>Sistema Veterinario</h1>
            <h4>Registro de Usuario</h4>
            <form>
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ingresa tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña" required>
                </div>

                <button type="submit" class="btn-submit">Aceptar</button>
            </form>

            <p class="login-link">¿Ya tienes una cuenta?<a href="login.html">Inicia sesión</a></p>
        </div>
    </div>

    <script src="../Js/register_login.js"></script>
</body>
</html>
