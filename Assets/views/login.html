<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../Styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="../Img/logo.png" alt="Login Image" class="login-image">
            <h1>Sistema Veterinario</h1>
            <h4>Iniciar Sesión</h4>
            <form>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Mantener contraseña</label>
                </div>

                <button type="submit" class="btn-submit">Aceptar</button>
            </form>

            <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>
    </div>

</body>
</html>
